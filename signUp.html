<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridiron Talk - Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<header class="site-header">
    <h1>🏈 Gridiron Talk</h1>
    <p>The Home of Football Discussion</p>
</header>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Let's Talk Ball!</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="login.html">Login</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="signup.html">Sign Up</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container mt-5">
    <body>

        <div class="container mt-5">

            <div class="row justify-content-center">

                <div class="col-md-6">

                    <div class="card shadow">

                        <div class="card-header text-center bg-black text-white">
                            <h2>🏈 Gridiron Talk Sign Up</h2>
                        </div>

                        <div class="card-body">

                            <form>

                                <!-- Username -->
                                <div class="mb-3">
                                    <label for="username" class="form-label">
                                        Username
                                    </label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="username"
                                        placeholder="Enter username"
                                    >
                                </div>

                                <!-- Email -->
                                <div class="mb-3">
                                    <label for="email" class="form-label">
                                        Email
                                    </label>
                                    <input
                                        type="email"
                                        class="form-control"
                                        id="email"
                                        placeholder="Enter email"
                                    >
                                </div>

                                <!-- Password -->
                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        Password
                                    </label>
                                    <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                    >
                                </div>

                                <!-- Radio Buttons -->
                                <div class="mb-3">
                                    <label class="form-label">
                                        Favorite Football Level
                                    </label>

                                    <div class="form-check">
                                        <input
                                            class="form-check-input"
                                            type="radio"
                                            name="footballType"
                                            id="nfl"
                                        >
                                        <label class="form-check-label" for="nfl">
                                            NFL
                                        </label>
                                    </div>

                                    <div class="form-check">
                                        <input
                                            class="form-check-input"
                                            type="radio"
                                            name="footballType"
                                            id="college"
                                        >
                                        <label class="form-check-label" for="college">
                                            College Football
                                        </label>
                                    </div>

                                    <div class="form-check">
                                        <input
                                            class="form-check-input"
                                            type="radio"
                                            name="footballType"
                                            id="both"
                                        >
                                        <label class="form-check-label" for="both">
                                            Both
                                        </label>
                                    </div>

                                </div>

                                <!-- Checkbox -->
                                <div class="mb-3 form-check">
                                    <input
                                        type="checkbox"
                                        class="form-check-input"
                                        id="terms"
                                    >

                                    <label class="form-check-label" for="terms">
                                        I agree to the Terms and Conditions
                                    </label>
                                </div>

                                <!-- Submit -->
                                <button
                                    type="submit"
                                    class="btn btn-secondary w-100"
                                >
                                    Create Account
                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>
    </body>
 </main>

<footer class="site-footer">
    <p>&copy; 2026 Gridiron Talk Forum</p>
</footer>

</body>
</html>
