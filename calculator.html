<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridiron Talk Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <header class="site-header">
        <h1>🏈 Gridiron Talk</h1>
        <p>The Home of Football Discussion</p>
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Let's Talk Ball!</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="signup.html">Sign Up</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="calculator.html"> Stat Calculator</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container mt-5">

        <div class="calculator-container">

            <h1>Calculator</h1>

            <input
                type="number"
                id="num1"
                placeholder="Enter first number"
            >

            <input
                type="number"
                id="num2"
                placeholder="Enter second number"
            >

            <div class="buttons">

                <button id="addBtn">+</button>

                <button id="subtractBtn">-</button>

                <button id="multiplyBtn">*</button>

                <button id="divideBtn">/</button>

            </div>

            <h2>Result:</h2>

            <p id="result">0</p>

        </div>


    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Gridiron Talk Forum</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
